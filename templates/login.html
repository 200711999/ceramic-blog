{% extends 'base.html' %}
{% block title %}
    登录
{% endblock %}
{% block nav_title %}
    登录
{% endblock %}

{% block nav_right %}
{% endblock %}

{% block content %}
    <div class="auth-card">
        <h2>欢迎归府</h2>
        <form novalidate>
            {% csrf_token %}
            <!-- 用户名 -->
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名">
                <span id="username_error" class="field-error"></span>
            </div>

            <!-- 密码 -->
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码">
                <span id="password_error" class="field-error"></span>
            </div>

            <!-- 验证码 -->
            <div class="form-group">
                <label for="code">验证码</label>
                <div class="captcha-row">
                    <input id="code" type="text" name="code" placeholder="请输入验证码" class="form-control">
                    <img id="code_img" src="/get_code/" alt="验证码图片" title="点击刷新">
                </div>
                <span id="code_error" class="field-error"></span>
            </div>

            <!-- 提交 -->
            <button id="login_btn" type="button" class="btn btn-primary">登录</button>

            <div class="auth-footer">
                尚未入府?<a href="/register/">去注册</a>
            </div>
        </form>
    </div>
{% endblock %}

{% block js %}
    <script>
        // 点击图片切换
        $("#code_img").click(function () {
            $(this).attr("src", "/get_code/?t=" + Date.now())
            $("#code").val("")
        })

        // 按钮发送请求
        $("#login_btn").click(function () {
            var $btn = $(this)
            var username = $("#username").val()
            var password = $("#password").val()
            var code = $("#code").val()

            window.setBtnLoading($btn, true, '登录中…')

            $.ajax({
                url: '/login/',
                type: 'post',
                data: {
                    username: username,
                    password: password,
                    code: code,
                    csrfmiddlewaretoken: '{{ csrf_token }}'
                },
                success: function (res) {
                    window.setBtnLoading($btn, false)
                    $(".field-error").text("")

                    if (res.code === 200) {
                        window.showToast(res.msg, 'success')
                        setTimeout(function () { location.href = '/index/' }, 600)
                    } else {
                        var error_msg = res.msg
                        for (var key in error_msg) {
                            $("#" + key + "_error").text(error_msg[key])
                        }
                        // 验证码错了也刷新一下
                        $("#code_img").attr("src", "/get_code/?t=" + Date.now())
                        $("#code").val("")
                    }
                },
                error: function () {
                    window.setBtnLoading($btn, false)
                    window.showToast('请求失败,请稍后再试', 'error')
                }
            })
        })

        // 回车登录
        $("form").keydown(function (e) {
            if (e.key === 'Enter') {
                e.preventDefault()
                $("#login_btn").click()
            }
        })
    </script>
{% endblock %}
