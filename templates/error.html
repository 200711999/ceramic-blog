<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 页面不存在</title>
    <style>
        * { box-sizing: border-box }
        html, body { margin: 0; padding: 0 }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #f3efe6;
            color: #2d2a26;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            line-height: 1.6;
        }
        .card {
            background: #faf8f4;
            border: 1px solid #ddd5c8;
            border-radius: 12px;
            padding: 56px 48px;
            box-shadow: 0 4px 14px rgba(45, 35, 20, .06);
            max-width: 440px;
            width: 100%;
            text-align: center;
        }
        .code {
            font-size: 72px;
            font-weight: 700;
            color: #1a3a5c;
            margin: 0 0 12px;
            line-height: 1;
            letter-spacing: -2px;
        }
        .title {
            font-size: 18px;
            color: #2d2a26;
            margin: 0 0 6px;
            font-weight: 600;
        }
        .desc {
            font-size: 13px;
            color: #7a7268;
            margin: 0 0 28px;
        }
        .home-btn {
            display: inline-block;
            background: #1a3a5c;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            text-decoration: none;
            transition: all .18s ease;
        }
        .home-btn:hover {
            background: #2a5278;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 58, 92, .25);
        }
        .meta {
            margin-top: 24px;
            font-size: 12px;
            color: #a8a095;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">404</div>
        <div class="title">页面不存在</div>
        <p class="desc">您访问的页面可能已被删除、地址有误,或处于私有状态</p>
        <a class="home-btn" href="/index/">返回首页</a>
        <div class="meta">仅供学习交流</div>
    </div>
</body>
</html>
